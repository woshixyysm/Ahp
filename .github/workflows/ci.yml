# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Standalone tests (no LLVM, Linux x86-64 for fast feedback) ─────────────
  standalone:
    name: "Standalone (${{ matrix.os }}, ${{ matrix.build }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        build: [normal, asan, ubsan]
    steps:
      - uses: actions/checkout@v4

      - name: Build & test (${{ matrix.build }})
        run: |
          case "${{ matrix.build }}" in
            normal) make test ;;
            asan)   make test_asan ;;
            ubsan)  make test_ubsan ;;
          esac

  # ── LLVM-linked plugin build + integration tests (AArch64 runner) ──────────
  llvm-plugin:
    name: "LLVM plugin (${{ matrix.build-type }})"
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        build-type: [Release, Debug, RelWithDebInfo]

    env:
      CC:       clang-21
      CXX:      clang++-21
      LLVM_DIR: /usr/lib/llvm-21/lib/cmake/llvm

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 + tools
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y \
            "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-21-dev libllvm21 clang-21 clang-tidy-21 \
            libmlir-21-dev mlir-21-tools

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DLLVM_DIR=${{ env.LLVM_DIR }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }}

      - name: Build
        run: cmake --build build --verbose

      - name: Test
        run: ctest --test-dir build --output-on-failure -V

      - name: clang-tidy (Release only)
        if: matrix.build-type == 'Release'
        run: |
          cmake -B build-tidy -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=${{ env.LLVM_DIR }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build-tidy --verbose
          clang-tidy-21 --config-file=.clang-tidy \
            -p build-tidy \
            lib/AArch64HeteroOpt.cpp \
            || true   # non-fatal until baseline is established

      - name: Upload Release artifact
        if: matrix.build-type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: AArch64HeteroOpt-llvm21-arm64
          path: build/AArch64HeteroOpt.so

  # ── UBSan + ASan plugin build ───────────────────────────────────────────────
  sanitized-plugin:
    name: "Sanitized plugin (${{ matrix.san }})"
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        san: [address, undefined]

    env:
      CC:       clang-21
      CXX:      clang++-21
      LLVM_DIR: /usr/lib/llvm-21/lib/cmake/llvm

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y \
            "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build llvm-21-dev libllvm21 clang-21

      - name: Configure with ${{ matrix.san }}san
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLLVM_DIR=${{ env.LLVM_DIR }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DUSE_SANITIZERS=${{ matrix.san }}

      - name: Build
        run: cmake --build build --verbose

      - name: Test
        run: ctest --test-dir build --output-on-failure -V
