# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: "Release build (LLVM 21, AArch64)"
    runs-on: ubuntu-24.04-arm

    env:
      CC:       clang-21
      CXX:      clang++-21
      LLVM_DIR: /usr/lib/llvm-21/lib/cmake/llvm

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y \
            "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-21-dev libllvm21 clang-21 \
            libmlir-21-dev mlir-21-tools

      - name: Standalone tests
        run: make test

      - name: Configure (Release + LTO)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=${{ env.LLVM_DIR }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DENABLE_LTO=ON

      - name: Build
        run: cmake --build build --verbose

      - name: Integration tests
        run: ctest --test-dir build --output-on-failure -V

      - name: Package
        run: |
          VER="${{ github.ref_name }}"
          OUTDIR="dist/AArch64HeteroOpt-${VER}"
          mkdir -p "${OUTDIR}"
          cp build/AArch64HeteroOpt.so "${OUTDIR}/"
          cp -r include/ "${OUTDIR}/include/"
          cp README.md LICENSE "${OUTDIR}/"
          tar czf "AArch64HeteroOpt-${VER}-llvm21-arm64.tar.gz" \
              -C dist "AArch64HeteroOpt-${VER}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AArch64HeteroOpt-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
